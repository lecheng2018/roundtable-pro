<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>圆桌 Pro</title>
<style>
/* ─── QwenPaw Console Design Tokens — Light (default) ──────────────────── */
:root{
  --bg:#f9f8f4;
  --panel:#ffffff;
  --surface:#f5f5f5;
  --text:rgba(0,0,0,.88);
  --text-sec:rgba(0,0,0,.65);
  --text-ter:rgba(0,0,0,.45);
  --muted:rgba(0,0,0,.25);
  --primary:#ff7f16;
  --primary-hover:#ff9438;
  --primary-tint:rgba(255,127,22,.06);
  --danger:#ff4d4f;
  --success:#52c41a;
  --warn:#faad14;
  --border:rgba(0,0,0,.06);
  --border-strong:rgba(0,0,0,.15);
  --radius-card:8px;
  --radius-sm:6px;
  --shadow:0 1px 2px 0 rgba(0,0,0,.03);
  --font:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --hover-bg:rgba(0,0,0,.04);
  --code-bg:rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;overflow-x:hidden;color-scheme:light dark}
.rt-container{max-width:1200px;margin:0 auto;padding:20px 24px}

/* ─── Dark mode overrides ─────────────────────────────────────────────────── */
html.dark-mode{
  --bg:#141414;
  --panel:#1f1f1f;
  --surface:#2a2a2a;
  --text:rgba(255,255,255,.85);
  --text-sec:rgba(255,255,255,.65);
  --text-ter:rgba(255,255,255,.45);
  --muted:rgba(255,255,255,.35);
  --primary:#ff7f16;
  --primary-hover:#ff9438;
  --primary-tint:rgba(255,127,22,.08);
  --danger:#ff4d4f;
  --success:#52c41a;
  --warn:#faad14;
  --border:rgba(255,255,255,.1);
  --border-strong:rgba(255,255,255,.15);
  --hover-bg:#313131;
  --code-bg:rgba(0,0,0,.35);
}
html.dark-mode body{color-scheme:dark}

/* ─── Common ──────────────────────────────────────────────────────────────── */
.rt-container{max-width:1200px;margin:0 auto;padding:20px 24px}

/* ─── Tabs ───────────────────────────────────────────────────────────────── */
.rt-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.rt-tab{padding:10px 20px;cursor:pointer;color:var(--text-sec);border-bottom:2px solid transparent;transition:all .2s;font-size:14px;user-select:none}
.rt-tab:hover{color:var(--text)}
.rt-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.rt-tab-content{display:none}
.rt-tab-content.active{display:block}

/* ─── Cards ──────────────────────────────────────────────────────────────── */
.section-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;margin-bottom:16px}
.section-card h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:6px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.persona-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.persona-card:hover{border-color:var(--primary);background:var(--primary-tint)}
.persona-card.selected{border-color:var(--primary);background:var(--primary-tint);box-shadow:0 0 0 1px var(--primary)}
.persona-card .p-icon{font-size:24px;margin-bottom:6px}
.persona-card .p-name{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text)}
.persona-card .p-desc{font-size:12px;color:var(--text-ter);line-height:1.5}

/* ─── Header ─────────────────────────────────────────────────────────────── */
.rt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.rt-header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text)}

/* ─── Forms ──────────────────────────────────────────────────────────────── */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text-sec);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select{width:100%;padding:7px 11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;transition:all .2s;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-tint)}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:768px){.form-row{grid-template-columns:1fr}}

/* ─── Buttons ────────────────────────────────────────────────────────────── */
.btn{padding:5px 12px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);line-height:1.6}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.85}
.btn-sm{padding:3px 8px;font-size:12px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-sec)}
.btn-ghost:hover{border-color:var(--text-sec);color:var(--text)}

/* ─── Agent list ─────────────────────────────────────────────────────────── */
.agent-list{display:flex;flex-direction:column;gap:8px}
.agent-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:12px;transition:background .2s}
.agent-row:hover{background:var(--hover-bg)}
.agent-row-info{flex:1;min-width:0}
.agent-row-name{font-size:14px;font-weight:600;color:var(--text)}
.agent-row-meta{font-size:12px;color:var(--text-ter);margin-top:1px}
.agent-row-status{font-size:12px;font-weight:500;white-space:nowrap;color:var(--success)}
.agent-row-status.inactive{color:var(--muted)}
.agent-row-actions{display:flex;gap:6px;flex-shrink:0}

/* ─── Stage / Discussion area ────────────────────────────────────────────── */
.rt-stage{border:1px solid var(--border);border-radius:var(--radius-card);background:var(--panel);padding:16px;max-height:600px;overflow-y:auto;margin-bottom:12px;min-height:120px;font-size:13px}
.rt-stage::-webkit-scrollbar{width:6px}
.rt-stage::-webkit-scrollbar-track{background:transparent}
.rt-stage::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.rt-status{color:var(--primary);font-size:13px;padding:12px 0;display:flex;align-items:center;gap:8px}
.rt-report{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;line-height:1.8;margin:14px 0}
.rt-msg{padding:8px 0;border-bottom:1px solid var(--border)}
.rt-msg:last-child{border-bottom:none}
.rt-msg .name{font-weight:600;font-size:12px;color:var(--primary)}
.rt-msg .role{font-size:11px;color:var(--text-ter);margin-left:6px}
.rt-msg .text{margin-top:4px;line-height:1.6}
.rt-msg .text pre{background:var(--bg);padding:8px;border-radius:6px;overflow-x:auto;margin:4px 0;font-size:12px;border:1px solid var(--border)}

/* ─── Messages ───────────────────────────────────────────────────────────── */
.msg{margin-bottom:12px;padding:10px 14px;border-radius:var(--radius-sm);background:var(--surface);border-left:3px solid var(--border)}
.msg.host{border-left-color:var(--primary)}
.msg.debate{border-left-color:var(--text-ter)}
.msg.judge{border-left-color:var(--success)}
.msg .msg-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.msg .msg-hdr .role{font-size:12px;font-weight:600;color:var(--primary)}
.msg .msg-hdr .name{font-size:12px;color:var(--text-sec)}
.msg .msg-hdr .time{font-size:11px;color:var(--muted);margin-left:auto}
.msg .msg-body{font-size:13px;line-height:1.7;color:var(--text);word-break:break-word}
.msg .msg-body p{margin-bottom:6px}
.msg .msg-body ul,.msg .msg-body ol{padding-left:18px;margin-bottom:6px}
.msg .msg-body code{background:var(--code-bg);padding:1px 5px;border-radius:3px;font-size:12px}

/* ─── Config area ────────────────────────────────────────────────────────── */
.config-area{margin-bottom:14px}
.agent-input-row{display:grid;grid-template-columns:1fr 0.8fr 1fr 0.6fr auto;gap:8px;margin-bottom:8px;align-items:end}
.agent-input-row label{font-size:11px;color:var(--text-ter);margin-bottom:2px}
.agent-input-row input,.agent-input-row select{width:100%;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;outline:none}
.agent-input-row input:focus,.agent-input-row select:focus{border-color:var(--primary)}
@media(max-width:768px){.agent-input-row{grid-template-columns:1fr 1fr}}

/* ─── Topic input ────────────────────────────────────────────────────────── */
.topic-input{width:100%;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none;transition:all .2s}
.topic-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-tint)}

/* ─── Select agent checkbox ──────────────────────────────────────────────── */
.agent-select-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;margin-bottom:6px}
.agent-select-row:hover{border-color:var(--primary);background:var(--primary-tint)}
.agent-select-row input[type="checkbox"]{accent-color:var(--primary);width:16px;height:16px}
.agent-select-row .a-icon{font-size:18px}
.agent-select-row .a-info{flex:1}
.agent-select-row .a-name{font-size:13px;font-weight:500}
.agent-select-row .a-model{font-size:11px;color:var(--text-ter)}

/* ─── Toggle switch ──────────────────────────────────────────────────────── */
.toggle-wrap{display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;user-select:none}
.toggle-track{width:36px;height:20px;background:var(--border-strong);border-radius:10px;position:relative;transition:all .2s;flex-shrink:0}
.toggle-track.on{background:var(--primary)}
.toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s}
.toggle-track.on .toggle-thumb{left:18px}
.toggle-label{font-size:13px;color:var(--text-sec)}

/* ─── Empty state ────────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .e-icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:13px;color:var(--text-ter)}

/* ─── Toast ──────────────────────────────────────────────────────────────── */
.toast.show{display:block}
.toast.success{background:#d4edd7;color:#1f7042;border:1px solid var(--success)}
.toast.error{background:#ffd8d6;color:#b41e1e;border:1px solid var(--danger)}
html.dark-mode .toast.success{background:#1a3a2a;color:#b7eb8f;border:1px solid var(--success)}
html.dark-mode .toast.error{background:#3a1a1a;color:#ffa39e;border:1px solid var(--danger)}

/* ─── History tab ────────────────────────────────────────────────────────── */
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.history-item:hover{background:var(--hover-bg);border-color:var(--border-strong)}
.history-item .h-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.history-item .h-meta{font-size:12px;color:var(--text-ter);display:flex;gap:12px}
.history-item .h-actions{display:flex;gap:6px;margin-top:6px}
.history-empty{text-align:center;padding:40px 20px;color:var(--muted)}
.history-empty p{margin-bottom:8px}
.history-empty a{color:var(--primary);cursor:pointer}
.history-detail-msg{padding:12px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:8px;border-left:3px solid var(--border)}
.history-detail-msg .hd-role{font-size:11px;color:var(--text-ter);margin-bottom:4px}
.history-detail-msg .hd-name{font-weight:600;font-size:14px}
.history-detail-msg .hd-text{font-size:13px;margin-top:4px;line-height:1.7;color:var(--text)}
.history-detail-report{background:var(--surface);border-radius:var(--radius-sm);padding:16px;margin-top:12px}
.history-detail-report h4{color:var(--primary);margin-bottom:8px}
.history-detail-report .hd-summary{font-size:13px;line-height:1.7;white-space:pre-wrap}
.h-del-btn{color:var(--danger);cursor:pointer}

/* ─── Modal ──────────────────────────────────────────────────────────────── */
.rt-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center}
.rt-modal{background:var(--panel);border-radius:var(--radius-card);padding:24px;min-width:340px;max-width:460px;box-shadow:0 6px 16px rgba(0,0,0,.4);border:1px solid var(--border)}
.rt-modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.rt-modal .btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* ─── Stream indicator ───────────────────────────────────────────────────── */
.stream-dot{display:inline-block;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ─── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}

/* ─── Selection ──────────────────────────────────────────────────────────── */
::selection{background:var(--primary-tint);color:var(--text)}
</style>
<script>
// Detect parent frame theme and apply to iframe
(function(){
  try {
    var parentHtml = window.parent.document.documentElement;
    if (parentHtml.classList.contains('dark-mode')) {
      document.documentElement.classList.add('dark-mode');
    }
    // Listen for theme changes in parent
    var observer = new MutationObserver(function() {
      var isDark = parentHtml.classList.contains('dark-mode');
      document.documentElement.classList.toggle('dark-mode', isDark);
    });
    observer.observe(parentHtml, { attributes: true, attributeFilter: ['class'] });
  } catch(e) {
    // Fallback: use prefers-color-scheme
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    if (mq.matches) document.documentElement.classList.add('dark-mode');
    mq.addListener(function(e) {
      document.documentElement.classList.toggle('dark-mode', e.matches);
    });
  }
})();
</script></head>
<body>

<div id="toast" class="toast"></div>

<div class="rt-container">
  <div class="rt-header">
    <h1>🗣️ 圆桌 Pro</h1>
  </div>

  <!-- Tabs -->
  <div class="rt-tabs">
    <div class="rt-tab active" data-tab="discuss">💬 讨论</div>
    <div class="rt-tab" data-tab="agents">🤖 辩手管理</div>
    <div class="rt-tab" data-tab="history">📋 历史记录</div>
  </div>

  <!-- Tab: Discuss -->
  <div class="rt-tab-content active" id="tab-discuss">
    <div class="section-card">
      <h3>🎯 讨论话题</h3>
      <input class="topic-input" id="topic" placeholder="输入讨论话题，例如：Python vs JavaScript 谁更好？">
    </div>

    <!-- Section: Pick from created agents -->
    <div class="section-card" id="agent-pick-section">
      <h3>🤖 选择辩手参与讨论</h3>
      <div id="agent-pick-list"></div>
      <div style="margin-top:8px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="toggle-manual"> 切换为手动配置（Provider/模型）
        </label>
      </div>
    </div>

    <!-- Section: Manual config (hidden by default, shown when toggle or no agents) -->
    <div class="section-card" id="manual-config-section" style="display:none">
      <h3>👥 手动配置参与者</h3>
      <div id="agents-config"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-ghost btn-sm" onclick="addAgentRow()">＋ 添加参与者</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <div class="section-card" style="padding:12px 16px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:0;width:100%">
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:13px;color:var(--text-sec);font-weight:500">模式</label>
          <select id="mode-select" style="padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none">
            <option value="discuss">🎙️ 标准讨论（含裁判总结）</option>
            <option value="brainstorm">💡 头脑风暴（自由发散）</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:13px;color:var(--text-sec);font-weight:500">轮数</label>
          <input type="number" id="rounds-input" value="3" min="1" max="10" style="width:60px;padding:5px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;text-align:center">
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="checkbox" id="judge-toggle" checked style="accent-color:var(--primary);width:16px;height:16px" onchange="toggleJudgeConfig()">
          <label for="judge-toggle" style="font-size:13px;color:var(--text-sec);cursor:pointer">⚖️ 裁判总结</label>
        </div>
        <div id="judge-config" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div id="judge-ready" style="display:none;font-size:13px;color:var(--success,#52c41a)">✅ 裁判智能体已就绪，请从上方辩手列表中勾选</div>
          <div id="judge-create" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:6px">
              <label style="font-size:12px;color:var(--text-ter)">Provider</label>
              <select id="judge-provider" style="padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;outline:none" onchange="updateJudgeModel()">
                <option value="">选择</option>
              </select>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <label style="font-size:12px;color:var(--text-ter)">模型</label>
              <select id="judge-model" style="padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;outline:none">
                <option value="">选择</option>
              </select>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="createJudgeAgent()" title="创建为辩手">＋ 创建裁判智能体</button>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <button class="btn btn-primary" onclick="startDiscussion()">🚀 开始讨论</button>
      <button class="btn btn-ghost btn-sm" onclick="stopDiscussion()" id="stop-btn" style="display:none">⏹ 停止</button>
    </div>

    <div id="stage" class="rt-stage" style="display:none">
      <div id="messages"></div>
      <div id="status" class="rt-status"></div>
    </div>
    <div id="report" class="rt-report" style="display:none"></div>
  </div>

  <!-- Tab: Agent Management -->
  <div class="rt-tab-content" id="tab-agents">
    <!-- Step 1: Pick persona -->
    <div class="section-card">
      <h3>📋 选择人设</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px">选择一个角色模板，创建真实 QwenPaw 智能体</p>
      <div id="persona-grid" class="card-grid"></div>
    </div>

    <!-- Step 2: Configure -->
    <div class="section-card" id="create-form" style="display:none">
      <h3>⚙️ 配置辩手</h3>
      <div id="selected-persona-info" style="font-size:13px;color:var(--muted);margin-bottom:10px"></div>
      <div class="form-group">
        <label>辩手名称</label>
        <input id="agent-name" placeholder="输入自定义名称，如 Python极客小张" value="">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Provider</label>
          <select id="agent-provider"></select>
        </div>
        <div class="form-group">
          <label>模型</label>
          <select id="agent-model"></select>
        </div>
        <div class="form-group">
          <label>立场（可自定义）</label>
          <input id="agent-stance" placeholder="例如：支持Python生态">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" onclick="createAgent()">🤖 创建辩手</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelCreateAgent()">取消</button>
      </div>
    </div>

    <!-- Step 3: Created agents list -->
    <div class="section-card">
      <h3>📋 已创建的辩手</h3>
      <div id="created-agents">
        <div class="empty-state">
          <div class="e-icon">🤖</div>
          <p>还没有辩手。选个人设创建吧！</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab: History -->
  <div class="rt-tab-content" id="tab-history">
    <div class="section-card" id="history-list-view">
      <h3>📋 历史讨论记录</h3>
      <div id="history-list"></div>
    </div>
    <div class="section-card" id="history-detail-view" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <button class="btn btn-ghost btn-sm" onclick="showHistoryList()">← 返回列表</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentHistory()">🗑 删除</button>
      </div>
      <div id="history-detail-content"></div>
    </div>
  </div>

</div>

<script>
const API = window.location.pathname.includes('/frontend_plugin/')
  ? '/api/frontend_plugin/roundtable-pro'
  : '/api/roundtable-pro';

let providers = [];
let allPersonas = [];
let selectedPersona = null;
let debaters = [];
let discussionActive = false;
let eventSource = null;

// ── Utilities ──
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(t._hide); t._hide = setTimeout(() => t.classList.remove('show'), 3000);
}

async function api(path, opts={}) {
  const r = await fetch(API + path, { headers:{'Content-Type':'application/json'}, ...opts });
  if (!r.ok) { const txt = await r.text().catch(()=>''); throw new Error(r.status + ' ' + txt.slice(0,100)); }
  if (opts.raw) return r;
  if (opts.blob) return r.blob();
  const ct = r.headers.get('content-type')||'';
  if (ct.includes('application/json')) return r.json();
  const txt = await r.text();
  try { return JSON.parse(txt); } catch(e) { return txt; }
}

function $(id) { return document.getElementById(id); }

// ── Tabs ──
document.querySelectorAll('.rt-tab').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.rt-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.rt-tab-content').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    $(`tab-${el.dataset.tab}`).classList.add('active');
    if (el.dataset.tab === 'agents') { loadPersonas(); loadDebaters(); }
    if (el.dataset.tab === 'discuss') {
    loadDebatersForPick();
    updateJudgeConfigUI();
    // Sync manual toggle UI
    const manual = $('toggle-manual');
    const manualSection = $('manual-config-section');
    const pickSection = $('agent-pick-section');
    if (manual && manual.checked) {
      manualSection.style.display = 'block';
      pickSection.style.display = 'none';
    } else {
      pickSection.style.display = 'block';
      // auto-show if no agents
      if (debaters.filter(a => a.enabled !== false).length === 0) {
        manualSection.style.display = 'block';
      } else {
        manualSection.style.display = 'none';
      }
    }
    }
    if (el.dataset.tab === 'history') {
      loadHistoryList();
    }
  });
});

// ── Providers (from existing models endpoint) ──
async function loadProviders() {
  try {
    const data = await api('/models');
    providers = (data || []).filter(p => p.provider_id && p.models && p.models.length > 0);
  } catch(e) { providers = []; }
  populateProviderSelects();
  populateJudgeProvider();
}

function populateJudgeProvider() {
  const jsel = $('judge-provider');
  if (!jsel || providers.length === 0) return;
  jsel.innerHTML = '<option value="">选择</option>';
  providers.forEach(p => {
    jsel.innerHTML += `<option value="${p.provider_id}">${p.provider||p.provider_id}</option>`;
  });
  // Default to a provider that has an API key configured, otherwise first with models
  const withKey = providers.find(p => p.api_key && p.models && p.models.length > 0);
  const fallback = withKey || providers.find(p => p.models && p.models.length > 0) || providers[0];
  if (fallback) { jsel.value = fallback.provider_id; updateJudgeModel(); }
}

function populateProviderSelects() {
  const s = $('agent-provider');
  if (!s) return;
  s.innerHTML = '<option value="">选择 Provider</option>' +
    providers.map(p => `<option value="${p.provider_id}">${p.provider||p.provider_id}</option>`).join('');
  // Bind change event to update model dropdown
  s.onchange = function() { onProviderChange('agent-provider', 'agent-model'); };
}

function onProviderChange(selectId, modelSelectId) {
  const sel = $(selectId); const msel = $(modelSelectId);
  if (!sel || !msel) return;
  const pid = sel.value;
  const prov = providers.find(p => p.provider_id === pid);
  msel.innerHTML = '<option value="">选择模型</option>';
  if (prov && prov.models) {
    for (const m of prov.models) {
      // models can be strings or objects {id, name, category}
      const mid = typeof m === 'string' ? m : (m.id || m);
      const mname = typeof m === 'string' ? m : (m.name || m.id || m);
      msel.innerHTML += `<option value="${mid}">${mname}</option>`;
    }
  }
}

// ── Persona Templates (Subtask 0) ──
async function loadPersonas() {
  try {
    allPersonas = await api('/personas');
  } catch(e) { allPersonas = []; }
  renderPersonaGrid();
}

let personaIcons = {'python_expert':'🐍','js_fullstack':'🎨','data_scientist':'🧪','product_manager':'👤','ops_engineer':'🔧','skeptic':'🤔','optimist':'🎯','risk_officer':'⚠️'};

function renderPersonaGrid() {
  const grid = $('persona-grid');
  if (!grid) return;
  if (!allPersonas.length) {
    grid.innerHTML = '<div class="empty-state"><p>暂无可用人设</p></div>';
    return;
  }
  grid.innerHTML = allPersonas.map(p => `
    <div class="persona-card ${selectedPersona && selectedPersona.id === p.id ? 'selected' : ''}"
         onclick="selectPersona('${p.id}')">
      <div class="p-icon">${personaIcons[p.id]||'🤖'}</div>
      <div class="p-name">${p.name}</div>
      <div class="p-desc">${p.description||''}</div>
    </div>
  `).join('');
}

function selectPersona(id) {
  selectedPersona = allPersonas.find(p => p.id === id);
  renderPersonaGrid();
  if (selectedPersona) {
    $('create-form').style.display = 'block';
    $('selected-persona-info').textContent = `已选: ${selectedPersona.name} — ${selectedPersona.description||''}`;
    $('agent-name').value = selectedPersona.name.replace(/[^\w\u4e00-\u9fff]/g,'').slice(0,10) || '辩手';
    $('agent-stance').value = selectedPersona.suggested_stance || '';
    // Set default provider/model
    const provSelect = $('agent-provider');
    const modelSelect = $('agent-model');
    if (selectedPersona.suggested_provider) {
      provSelect.value = selectedPersona.suggested_provider;
      onProviderChange('agent-provider', 'agent-model');
      if (selectedPersona.suggested_model) {
        setTimeout(() => { modelSelect.value = selectedPersona.suggested_model; }, 100);
      }
    }
  }
}

function cancelCreateAgent() {
  selectedPersona = null;
  $('create-form').style.display = 'none';
  renderPersonaGrid();
}

// ── Create Agent (Subtask 2/3) ──
async function createAgent() {
  if (!selectedPersona) { toast('请先选择一个人设', 'error'); return; }
  const name = $('agent-name').value.trim();
  if (!name) { toast('请输入辩手名称', 'error'); return; }
  const provider = $('agent-provider').value;
  const model = $('agent-model').value;
  if (!provider || !model) { toast('请选择 Provider 和模型', 'error'); return; }
  const stance = $('agent-stance').value.trim() || selectedPersona.suggested_stance || '';

  try {
    const result = await api('/debaters', {
      method: 'POST',
      body: JSON.stringify({
        template_id: selectedPersona.id,
        name: name,
        provider: provider,
        model: model,
        stance: stance,
      }),
    });
    toast(`✅ 辩手「${name}」创建成功！`);
    selectedPersona = null;
    $('create-form').style.display = 'none';
    renderPersonaGrid();
    loadDebaters();
    $('agent-name').value = '';
  } catch(e) {
    toast('创建失败: ' + e.message, 'error');
  }
}

// ── List Debaters (Subtask 3) ──
async function loadDebaters() {
  try {
    debaters = await api('/debaters');
  } catch(e) { debaters = []; }
  renderDebaterList();
  updateJudgeConfigUI();
  return debaters;
}

function renderDebaterList() {
  const container = $('created-agents');
  if (!container) return;
  if (!debaters.length) {
    container.innerHTML = '<div class="empty-state"><div class="e-icon">🤖</div><p>还没有辩手。选个人设创建吧！</p></div>';
    return;
  }
  container.innerHTML = '<div class="agent-list">' + debaters.map(a => `
    <div class="agent-row" id="agent-row-${a.agent_id}">
      <div class="agent-row-info">
        <div class="agent-row-name">${personaIcons[a.persona_id]||'🤖'} ${a.name}</div>
        <div class="agent-row-meta">${a.model} · ${a.stance||'无立场'} · ${a.agent_id}</div>
      </div>
      <span class="agent-row-status ${a.enabled !== false ? '' : 'inactive'}">${a.enabled !== false ? '✅ 就绪' : '⛔ 停用'}</span>
      <div class="agent-row-actions">
        <button class="btn btn-sm btn-ghost" onclick="editDebater('${a.agent_id}')">✏️ 编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteAgent('${a.agent_id}')">🗑 删除</button>
      </div>
    </div>
  `).join('') + '</div>';
}

function editDebater(agentId) {
  const a = debaters.find(d => d.agent_id === agentId);
  if (!a) return;
  const row = $('agent-row-' + agentId);
  if (!row) return;
  // Replace row with inline edit form
  row.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:end;width:100%">
      <div style="flex:1;min-width:120px">
        <label style="font-size:11px;color:var(--muted)">Provider</label>
        <select id="edit-provider-${agentId}" style="width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"
          onchange="editProviderChange('${agentId}')">
          <option value="">选择</option>
          ${providers.map(p => `<option value="${p.provider_id}" ${p.provider_id===a.provider?'selected':''}>${p.provider||p.provider_id}</option>`).join('')}
        </select>
      </div>
      <div style="flex:1;min-width:120px">
        <label style="font-size:11px;color:var(--muted)">模型</label>
        <select id="edit-model-${agentId}" style="width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <option value="">选择</option>
        </select>
      </div>
      <div style="display:flex;gap:4px;align-items:end;padding-bottom:2px">
        <button class="btn btn-primary btn-sm" onclick="saveDebaterEdit('${agentId}')">💾 保存</button>
        <button class="btn btn-ghost btn-sm" onclick="loadDebaters()">取消</button>
      </div>
    </div>
  `;
  // Populate model dropdown for current provider
  const prov = providers.find(p => p.provider_id === a.provider);
  const msel = document.getElementById('edit-model-' + agentId);
  if (prov && prov.models) {
    for (const m of prov.models) {
      const mid = typeof m === 'string' ? m : (m.id || m);
      const mname = typeof m === 'string' ? m : (m.name || m.id || m);
      msel.innerHTML += `<option value="${mid}" ${mid===a.model?'selected':''}>${mname}</option>`;
    }
  }
}

function editProviderChange(agentId) {
  const pid = document.getElementById('edit-provider-' + agentId).value;
  const msel = document.getElementById('edit-model-' + agentId);
  msel.innerHTML = '<option value="">选择</option>';
  if (!pid) return;
  const prov = providers.find(p => p.provider_id === pid);
  if (prov && prov.models) {
    for (const m of prov.models) {
      const mid = typeof m === 'string' ? m : (m.id || m);
      const mname = typeof m === 'string' ? m : (m.name || m.id || m);
      msel.innerHTML += `<option value="${mid}">${mname}</option>`;
    }
  }
}

async function saveDebaterEdit(agentId) {
  const provider = document.getElementById('edit-provider-' + agentId).value;
  const model = document.getElementById('edit-model-' + agentId).value;
  if (!provider || !model) {
    toast('请选择 Provider 和模型', 'error');
    return;
  }
  try {
    await api('/debaters/' + agentId, {
      method: 'PUT',
      body: JSON.stringify({ provider, model }),
    });
    toast('更新成功');
    loadDebaters();
  } catch(e) {
    toast('更新失败: ' + e.message, 'error');
  }
}

async function deleteAgent(agentId) {
  if (!confirm('确定删除此辩手？')) return;
  try {
    await api('/debaters/' + agentId, { method: 'DELETE' });
    toast('已删除');
    loadDebaters();
  } catch(e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

// ── Pick agents for discussion ──
async function loadDebatersForPick() {
  await loadDebaters();
  const container = $('agent-pick-list');
  if (!container) return;
  const enabled = debaters.filter(a => a.enabled !== false);
  const section = $('agent-pick-section');
  const manualSection = $('manual-config-section');
  const manualCheckbox = $('toggle-manual');

  // Remove old listener to avoid duplicates
  const newCheckbox = manualCheckbox.cloneNode(true);
  manualCheckbox.parentNode.replaceChild(newCheckbox, manualCheckbox);

  if (!enabled.length) {
    // No agents → show manual config
    section.style.display = 'none';
    manualSection.style.display = 'block';
    return;
  }

  section.style.display = 'block';
  container.innerHTML = enabled.map(a => `
    <label class="agent-select-row">
      <input type="checkbox" class="pick-agent-cb" value="${a.agent_id}" data-name="${a.name}" data-stance="${a.stance||''}">
      <span class="a-icon">${personaIcons[a.persona_id]||'🤖'}</span>
      <span class="a-info">
        <span class="a-name">${a.name}</span>
        <span class="a-model">${a.model} · ${a.stance||'无立场'}</span>
      </span>
    </label>
  `).join('');

  const newManual = $('toggle-manual');
  if (newManual && !newManual.checked) {
    manualSection.style.display = 'none';
  }

  newManual.addEventListener('change', (e) => {
    if (e.target.checked) {
      manualSection.style.display = 'block';
      section.style.display = 'none';
    } else {
      manualSection.style.display = 'none';
      section.style.display = 'block';
    }
  });
}

// ── Manual agent config (existing logic) ──
function addAgentRow(provider, model, name, role, stance) {
  const container = $('agents-config');
  const roles = ['host','debater','debater','judge'];
  const roleNames = { host:'主持人', debater:'辩手', judge:'裁判' };
  const i = container.children.length;
  const roleVal = role || roles[Math.min(i, roles.length-1)];
  const div = document.createElement('div');
  div.className = 'agent-input-row';
  div.innerHTML = `
    <div><label>角色</label>
      <select onchange="updateRoleName(this)"><option value="host" ${roleVal==='host'?'selected':''}>主持人</option>
      <option value="debater" ${roleVal==='debater'?'selected':''}>辩手</option>
      <option value="judge" ${roleVal==='judge'?'selected':''}>裁判</option></select></div>
    <div><label>Provider</label><select class="a-provider" onchange="updateModels(this)"><option value="">选择</option>
      ${providers.map(p => `<option value="${p.provider_id}" ${p.provider_id===provider?'selected':''}>${p.provider||p.provider_id}</option>`).join('')}</select></div>
    <div><label>模型</label><select class="a-model"><option value="">选择</option></select></div>
    <div><label>名称</label><input class="a-name" value="${name||roleNames[roleVal]||'参与者'+(i+1)}"></div>
    <div><label>立场</label><input class="a-stance" value="${stance||''}" placeholder="可选"></div>
    <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()" style="margin-bottom:0">✕</button>
  `;
  container.appendChild(div);
  if (provider) setTimeout(() => { updateModels(div.querySelector('.a-provider')); }, 50);
}

function updateRoleName(sel) {
  const names = { host:'主持人', debater:'辩手', judge:'裁判' };
  const row = sel.closest('.agent-input-row');
  const nameInput = row.querySelector('.a-name');
  if (nameInput && !nameInput.dataset.custom) nameInput.value = names[sel.value] || '参与者';
}

function updateJudgeModel() {
  const pid = $('judge-provider').value;
  const msel = $('judge-model');
  msel.innerHTML = '<option value="">选择</option>';
  if (!pid) return;
  const prov = providers.find(p => p.provider_id === pid);
  if (prov && prov.models) {
    for (const m of prov.models) {
      const mid = typeof m === 'string' ? m : (m.id || m);
      const mname = typeof m === 'string' ? m : (m.name || m.id || m);
      msel.innerHTML += `<option value="${mid}">${mname}</option>`;
    }
  }
}

function toggleJudgeConfig() {
  const el = $('judge-config');
  if ($('judge-toggle').checked) {
    el.style.display = 'flex';
  } else {
    el.style.display = 'none';
  }
}

function updateJudgeConfigUI() {
  const hasJudge = debaters && Array.isArray(debaters) && debaters.some(d => d.name === '裁判');
  $('judge-ready').style.display = hasJudge ? '' : 'none';
  $('judge-create').style.display = hasJudge ? 'none' : '';
}

async function createJudgeAgent() {
  const provider = $('judge-provider').value;
  const model = $('judge-model').value;
  if (!provider || !model) {
    toast('请先选择裁判的 Provider 和模型', 'error');
    return;
  }
  // Pick a suitable persona for the judge
  try {
    const personas = await api('/personas');
    const judgePersona = personas.find(p =>
      /裁判|法官|judge|中立|评审|仲裁/i.test(p.name + p.description)
    ) || personas[0];
    if (!judgePersona) { toast('无人设模板可用', 'error'); return; }
    const result = await api('/debaters', {
      method: 'POST',
      body: JSON.stringify({
        template_id: judgePersona.id,
        name: '裁判',
        provider: provider,
        model: model,
        stance: '中立裁判',
      }),
    });
    toast('✅ 裁判智能体创建成功！');
    loadDebaters();
  } catch(e) {
    toast('创建裁判失败: ' + e.message, 'error');
  }
}

function updateModels(sel) {
  const row = sel.closest('.agent-input-row');
  const msel = row.querySelector('.a-model');
  const pid = sel.value;
  const prov = providers.find(p => p.provider_id === pid);
  msel.innerHTML = '<option value="">选择模型</option>';
  if (prov && prov.models) {
    for (const m of prov.models) {
      const mid = typeof m === 'string' ? m : (m.id || m);
      const mname = typeof m === 'string' ? m : (m.name || m.id || m);
      msel.innerHTML += `<option value="${mid}">${mname}</option>`;
    }
  }
}

// ── Start Discussion ──
async function startDiscussion() {
  const topic = $('topic').value.trim();
  if (!topic) { toast('请输入讨论话题', 'error'); return; }

  const mode = $('mode-select').value;
  const enableJudge = $('judge-toggle').checked;

  const pickedCbs = document.querySelectorAll('.pick-agent-cb:checked:not(:disabled)');
  const useManual = $('toggle-manual') && $('toggle-manual').checked;
  let agents = [];

  if (pickedCbs.length > 0 && !useManual) {
    // Use created agents
    agents = Array.from(pickedCbs).map(cb => {
      const a = debaters.find(d => d.agent_id === cb.value);
      if (!a) return null;
      const role = (a.name === '裁判' || a.name === '主持人') ? a.name === '主持人' ? 'host' : 'judge' : 'debater';
      return { agent_id: a.agent_id, name: a.name, role: role, stance: a.stance || '' };
    }).filter(Boolean);
    // Auto-add host, judge based on mode and settings
    if (mode !== 'brainstorm') {
      const hasHost = agents.some(a => a.role === 'host');
      const hasJudge = agents.some(a => a.role === 'judge' || a.name === '裁判');
      if (!hasHost) agents.unshift({ agent_id: agents[0]?.agent_id || '', name: '主持人', role: 'host', stance: '中立主持' });
      if (enableJudge && !hasJudge) {
        // Try to find a created judge agent in the debaters list
        const judgeAgent = debaters.find(d => d.name === '裁判' && !agents.some(a => a.agent_id === d.agent_id));
        if (judgeAgent) {
          agents.push({ agent_id: judgeAgent.agent_id, name: judgeAgent.name, role: 'judge', stance: judgeAgent.stance || '中立裁判' });
        } else {
          agents.push({ agent_id: '', name: '裁判', role: 'judge', stance: '中立裁判' });
        }
      }
    }
  } else {
    // Manual config
    const rows = document.querySelectorAll('#agents-config .agent-input-row');
    if (rows.length < 2) { toast('至少配置 2 位参与者', 'error'); return; }
    agents = Array.from(rows).map(row => ({
      provider: row.querySelector('.a-provider').value,
      model: row.querySelector('.a-model').value,
      name: row.querySelector('.a-name').value || '参与者',
      role: row.querySelector('select:first-child').value,
      stance: row.querySelector('.a-stance').value || '',
    }));
    if (agents.some(a => !a.provider || !a.model)) { toast('请为所有参与者选择 Provider 和模型', 'error'); return; }
  }

  // Show stage
  $('stage').style.display = 'block';
  $('messages').innerHTML = '';
  $('report').style.display = 'none';
  $('status').textContent = '🔄 正在发起讨论...';
  $('stop-btn').style.display = 'inline-flex';
  discussionActive = true;

  const endpoint = mode === 'brainstorm' ? '/brainstorm' : '/discuss';
  const body = { topic, mode, agents, rounds: parseInt($('rounds-input').value) || 3 };
  if (mode !== 'brainstorm' && enableJudge) {
    // If a judge agent is picked from the list, use its provider/model
    const pickedJudge = agents.find(a => a.name === '裁判' || a.role === 'judge');
    if (pickedJudge) {
      const d = debaters.find(d => d.agent_id === pickedJudge.agent_id);
      if (d && d.provider && d.model) {
        body.judge = { provider: d.provider, model: d.model, name: '裁判', role: 'judge', stance: '中立裁判' };
      }
    } else {
      // Fallback to manual config selects
      const jp = $('judge-provider').value;
      const jm = $('judge-model').value;
      if (jp && jm) {
        body.judge = { provider: jp, model: jm, name: '裁判', role: 'judge', stance: '中立裁判' };
      }
    }
  }

  try {
    const resp = await api(endpoint, { method:'POST', body:JSON.stringify(body), raw:true });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          const evt = line.slice(7).trim();
          // Next line is data
          continue;
        }
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            handleSSEEvent(data);
          } catch(e) {}
        }
      }
    }
  } catch(e) {
    $('status').textContent = '❌ 请求失败: ' + e.message;
  } finally {
    discussionActive = false;
    $('stop-btn').style.display = 'none';
  }
}

function handleSSEEvent(data) {
  if (data.type === 'config' || data.hid) {
    $('status').textContent = `🔄 讨论已启动 (ID: ${data.hid || data.config?.hid || ''})`;
  }
  if (data.round && data.name && data.content) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'rt-msg';
    const roleLabel = { host:'🎙️ 主持', debater:'💬 辩手', judge:'⚖️ 裁判' };
    msgDiv.innerHTML = `<div class="name">${roleLabel[data.role]||'👤'} ${data.name}</div>
      <div class="text">${formatContent(data.content)}</div>`;
    $('messages').appendChild(msgDiv);
    $('status').textContent = `🔄 第 ${data.round} 轮 · ${data.name} 发言中...`;
  }
  if (data.summary) {
    // Try to extract clean text if summary looks like nested JSON
    let summaryText = data.summary;
    if (typeof summaryText === 'string' && summaryText.trim().startsWith('{')) {
      try {
        const parsed = JSON.parse(summaryText);
        summaryText = parsed.summary || parsed.text || parsed.conclusion || summaryText;
      } catch(e) { /* keep original */ }
    }
    const consensusItems = data.consensus && data.consensus.length > 0
      ? data.consensus
      : (typeof data.summary === 'object' ? (data.summary.consensus || []) : []);
    const recItems = data.recommendations && data.recommendations.length > 0
      ? data.recommendations
      : (typeof data.summary === 'object' ? (data.summary.recommendations || []) : []);
    $('report').style.display = 'block';
    $('report').innerHTML = `<h3>📊 讨论总结</h3>
      <div class="meta">${summaryText}</div>
      ${consensusItems.length > 0 ? `<h4>✅ 共识</h4><ul>${consensusItems.map(c => '<li>'+c+'</li>').join('')}</ul>` : ''}
      ${recItems.length > 0 ? `<h4>💡 建议</h4><ul>${recItems.map(r => '<li>'+r+'</li>').join('')}</ul>` : ''}`;
    $('status').textContent = '✅ 讨论完成';
  }
  if (data.done) {
    $('status').textContent = '✅ 讨论完成 (ID: ' + data.hid + ')';
  }
}

function formatContent(text) {
  if (!text) return '';
  return text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
             .replace(/\n/g, '<br>');
}

function stopDiscussion() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  discussionActive = false;
  $('status').textContent = '⏹ 已停止';
  $('stop-btn').style.display = 'none';
}

// ── History ──
let _currentHistoryHid = null;

async function loadHistoryList() {
  try {
    const list = await api('/history');
    const container = $('history-list');
    if (!container) return;
    if (!list || list.length === 0) {
      container.innerHTML = '<div class="history-empty"><p>📭 暂无历史讨论记录</p><p style="font-size:12px">完成一次讨论后，记录会自动保存在这里</p></div>';
      return;
    }
    container.innerHTML = list.map(h => `
      <div class="history-item" onclick="showHistoryDetail('${h.hid}')">
        <div class="h-title">🎯 ${h.topic}</div>
        <div class="h-meta">${h.mode} · ${new Date(h.created_at).toLocaleString('zh-CN')} · ID: ${h.hid}</div>
        <div class="h-actions">
          <span class="btn btn-sm btn-ghost" onclick="event.stopPropagation();deleteHistory('${h.hid}')">🗑 删除</span>
        </div>
      </div>
    `).join('');
  } catch(e) {
    $('history-list').innerHTML = '<div class="history-empty"><p>❌ 加载失败</p><p style="font-size:12px">' + e.message + '</p></div>';
  }
}

async function showHistoryDetail(hid) {
  _currentHistoryHid = hid;
  try {
    const d = await api('/history/' + hid);
    if (!d || d.error) {
      toast('记录不存在', 'error');
      return;
    }
    $('history-list-view').style.display = 'none';
    $('history-detail-view').style.display = 'block';

    const roleLabel = { host:'🎙️ 主持', debater:'💬 辩手', judge:'⚖️ 裁判' };
    let msgsHtml = '';
    if (d.messages && d.messages.length > 0) {
      msgsHtml = d.messages.map(m => `
        <div class="history-detail-msg">
          <div class="hd-name">${roleLabel[m.role]||'👤'} ${m.name||''}</div>
          <div class="hd-text">${formatContent(m.content||'')}</div>
        </div>
      `).join('');
    } else {
      msgsHtml = '<div class="history-empty"><p>无消息记录</p></div>';
    }

    let reportHtml = '';
    if (d.report) {
      const r = d.report;
      // Safety: if summary looks like nested JSON, try to extract clean text
      let summaryText = r.summary || '';
      if (typeof summaryText === 'string' && summaryText.trim().startsWith('{')) {
        try {
          const parsed = JSON.parse(summaryText);
          summaryText = parsed.summary || parsed.text || parsed.conclusion || summaryText;
        } catch(e) { /* keep original */ }
      }
      const cons = (r.consensus && r.consensus.length) ? r.consensus : [];
      const recs = (r.recommendations && r.recommendations.length) ? r.recommendations : [];
      reportHtml = `<div class="history-detail-report">
        <h4>📊 讨论总结</h4>
        <div class="hd-summary">${summaryText}</div>
        ${cons.length ? `<h4>✅ 共识</h4><ul>${cons.map(c => '<li>'+c+'</li>').join('')}</ul>` : ''}
        ${recs.length ? `<h4>💡 建议</h4><ul>${recs.map(r => '<li>'+r+'</li>').join('')}</ul>` : ''}
      </div>`;
    }

    $('history-detail-content').innerHTML = `
      <div class="section-card" style="margin-bottom:12px">
        <h3>🎯 ${d.topic}</h3>
        <div class="h-meta">${d.mode} · ${new Date(d.created_at).toLocaleString('zh-CN')} · ID: ${d.hid}</div>
      </div>
      ${msgsHtml}
      ${reportHtml}
    `;
  } catch(e) {
    toast('加载详情失败: ' + e.message, 'error');
  }
}

function showHistoryList() {
  _currentHistoryHid = null;
  $('history-list-view').style.display = 'block';
  $('history-detail-view').style.display = 'none';
  loadHistoryList();
}

async function deleteHistory(hid) {
  if (!confirm('确定删除这条讨论记录？')) return;
  try {
    await api('/history/' + hid, { method: 'DELETE' });
    toast('已删除');
    loadHistoryList();
  } catch(e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

function deleteCurrentHistory() {
  if (_currentHistoryHid) deleteHistory(_currentHistoryHid);
}

// ── Init ──
function getModelId(prov) {
  if (!prov || !prov.models || !prov.models.length) return '';
  const m = prov.models[0];
  return typeof m === 'string' ? m : (m.id || m);
}

async function init() {
  // Must await providers first — all downstream code depends on it
  await loadProviders();
  loadPersonas();
  await loadDebaters();
  // Populate the agent pick list for the discuss tab (the tab is active by default)
  await loadDebatersForPick();
  // If there are already created agents, don't add manual rows.
  if (debaters.length > 0) return; // user has agents, no need for manual defaults
  if (providers.length === 0) { addAgentRow('','','主持人','host','中立客观'); addAgentRow('','','嘉宾A','debater','支持方'); addAgentRow('','','嘉宾B','debater','反对方'); return; }
  const p0 = providers[0], p1 = providers.length > 1 ? providers[1] : p0;
  addAgentRow(p0?.provider_id, getModelId(p0), '主持人', 'host', '中立客观');
  addAgentRow(p1?.provider_id, getModelId(p1), '嘉宾A', 'debater', '支持方');
  addAgentRow(providers.length > 2 ? providers[2]?.provider_id : p1?.provider_id, '', '嘉宾B', 'debater', '反对方');
  // show manual config since no agents exist
  $('manual-config-section').style.display = 'block';
}

init();</script>
